<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Comic Quest RPG Black Candle Labs</title>
  <style>
    :root {
      --void: #050508;
      --ink: #0d0d13;
      --panel: #12121c;
      --panel-soft: #191928;
      --text: #f7f4ff;
      --muted: #c9c3dd;
      --line: #f2edff;
      --candle: #f8d56b;
      --flame: #ff8f3d;
      --violet: #8f5cff;
      --purple: #4b1d86;
      --blue: #1b6fd6;
      --green: #5ee08a;
      --shadow: rgba(0, 0, 0, 0.62);
      --glow: rgba(143, 92, 255, 0.34);
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Trebuchet MS", Arial, sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(143, 92, 255, 0.28), transparent 28%),
        radial-gradient(circle at 82% 12%, rgba(27, 111, 214, 0.26), transparent 25%),
        radial-gradient(circle at 52% 92%, rgba(248, 213, 107, 0.12), transparent 26%),
        linear-gradient(135deg, #020204 0%, #0b0714 36%, #08101e 72%, #000 100%);
      color: var(--text);
    }

    .page {
      width: min(1120px, calc(100% - 32px));
      margin: 0 auto;
      padding: 28px 0;
    }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      margin-bottom: 20px;
    }

    .title-block h1 {
      margin: 0;
      color: var(--text);
      font-size: clamp(2.2rem, 6vw, 4.8rem);
      line-height: 0.92;
      text-transform: uppercase;
      text-shadow:
        0 0 18px rgba(143, 92, 255, 0.72),
        4px 4px 0 #251044,
        7px 7px 0 #000;
    }

    .title-block p {
      margin: 12px 0 0;
      max-width: 620px;
      color: var(--muted);
      font-weight: 700;
    }

    .choice-btn,
    .utility-btn {
      border: 3px solid var(--line);
      border-radius: 6px;
      background: linear-gradient(135deg, #171729, #0b0b13);
      color: var(--text);
      box-shadow: 4px 4px 0 #000, 0 0 18px rgba(143, 92, 255, 0.18);
      cursor: pointer;
      font: inherit;
      font-weight: 900;
      text-decoration: none;
      text-transform: uppercase;
      transition: transform 120ms ease, box-shadow 120ms ease, background 120ms ease;
    }

    .choice-btn,
    .utility-btn {
      padding: 14px 16px;
    }

    .choice-btn:hover,
    .utility-btn:hover,
    .choice-btn:focus-visible,
    .utility-btn:focus-visible {
      background: linear-gradient(135deg, var(--purple), var(--blue));
      box-shadow: 2px 2px 0 #000, 0 0 24px var(--glow);
      transform: translate(2px, 2px);
      outline: none;
    }

    .game-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 280px;
      gap: 18px;
      align-items: start;
    }

    .comic-panel,
    .stats-panel,
    .log-panel {
      border: 5px solid var(--line);
      border-radius: 8px;
      background:
        linear-gradient(145deg, rgba(255, 255, 255, 0.06), transparent 40%),
        var(--panel);
      box-shadow: 10px 10px 0 var(--shadow), 0 0 34px rgba(143, 92, 255, 0.18);
      color: var(--text);
    }

    .comic-panel {
      min-height: 430px;
      padding: 24px;
      position: relative;
      overflow: hidden;
    }

    .comic-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(circle, rgba(255, 255, 255, 0.08) 1px, transparent 1px),
        linear-gradient(120deg, transparent 0%, rgba(143, 92, 255, 0.12) 48%, transparent 75%);
      background-size: 12px 12px, 100% 100%;
      pointer-events: none;
    }

    .scene-tag {
      position: relative;
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 12px;
      border: 3px solid var(--line);
      background: linear-gradient(135deg, var(--purple), #181832);
      color: var(--text);
      font-weight: 900;
      text-transform: uppercase;
      box-shadow: 4px 4px 0 #000, 0 0 20px rgba(143, 92, 255, 0.36);
    }

    .choice-frames {
      position: relative;
      margin-top: 4px;
    }

    .choice-frame {
      min-height: 360px;
      border: 4px solid var(--line);
      border-radius: 6px;
      background:
        linear-gradient(135deg, rgba(248, 213, 107, 0.16), transparent 34%),
        linear-gradient(160deg, rgba(143, 92, 255, 0.16), rgba(5, 5, 8, 0.9)),
        repeating-linear-gradient(-8deg, rgba(255, 255, 255, 0.07) 0 2px, transparent 2px 9px);
      box-shadow: 5px 5px 0 #000;
      overflow: hidden;
      padding: 12px;
      display: grid;
      gap: 12px;
    }

    .art-frame,
    .story-frame {
      border: 3px solid var(--line);
      border-radius: 6px;
      background: rgba(5, 5, 8, 0.72);
      box-shadow: 4px 4px 0 #000;
    }

    .art-frame {
      position: relative;
      min-height: 190px;
      overflow: hidden;
      background: #0b0b13;
    }

    .art-image {
      display: block;
      width: 100%;
      height: 100%;
      min-height: 190px;
      object-fit: cover;
    }

    .art-placeholder {
      position: absolute;
      right: 12px;
      bottom: 12px;
      max-width: min(280px, calc(100% - 24px));
      border: 2px solid #000;
      background: rgba(248, 213, 107, 0.88);
      color: #140c00;
      box-shadow: 3px 3px 0 #000;
      font-size: 0.72rem;
      font-weight: 900;
      line-height: 1.2;
      padding: 6px 8px;
      text-transform: uppercase;
    }

    .story-frame {
      padding: 14px;
    }

    .frame-caption {
      max-width: 760px;
      margin: 0 0 12px;
      color: var(--text);
      font-size: clamp(1.15rem, 2.4vw, 1.55rem);
      font-weight: 900;
      line-height: 1.42;
      text-shadow: 2px 2px 0 #000;
    }

    .frame-note {
      max-width: 720px;
      color: var(--muted);
      font-size: 0.88rem;
      font-weight: 800;
      line-height: 1.35;
    }

    .choices {
      position: relative;
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 14px;
      margin-top: 18px;
    }

    .choice-btn.primary {
      background: linear-gradient(135deg, #5a20a8, #1b6fd6);
      color: #fff;
    }

    .choice-btn.secondary {
      background: linear-gradient(135deg, #101625, #30305b);
      color: #fff;
    }

    .choice-btn:disabled {
      cursor: not-allowed;
      opacity: 0.62;
      transform: none;
      box-shadow: 4px 4px 0 #000;
    }

    aside {
      display: grid;
      gap: 18px;
    }

    .stats-panel,
    .log-panel {
      padding: 18px;
    }

    .panel-title {
      margin: 0 0 14px;
      border-bottom: 3px solid var(--line);
      padding-bottom: 8px;
      color: var(--text);
      font-size: 1rem;
      text-transform: uppercase;
    }

    .stat-row {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin: 10px 0;
      color: var(--text);
      font-weight: 900;
    }

    .meter {
      height: 14px;
      overflow: hidden;
      border: 3px solid var(--line);
      border-radius: 999px;
      background: #050508;
    }

    .meter span {
      display: block;
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, var(--green), var(--candle));
      transition: width 180ms ease;
    }

    .inventory {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .item-chip {
      border: 2px solid var(--line);
      border-radius: 999px;
      padding: 5px 9px;
      background: rgba(248, 213, 107, 0.14);
      color: var(--text);
      font-size: 0.8rem;
      font-weight: 900;
    }

    .log-list {
      min-height: 92px;
      margin: 0;
      padding-left: 18px;
      color: var(--muted);
      font-size: 0.92rem;
      font-weight: 700;
    }

    .utility-row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-top: 16px;
    }

    .utility-btn {
      padding: 10px;
      font-size: 0.82rem;
      background: linear-gradient(135deg, #171729, #0b0b13);
    }

    @media (max-width: 860px) {
      header,
      .game-grid {
        grid-template-columns: 1fr;
      }

      header {
        display: grid;
      }

    }

    @media (max-width: 620px) {
      .page {
        width: min(100% - 20px, 1120px);
        padding: 18px 0;
      }

      .comic-panel {
        padding: 18px;
      }

      .choices,
      .utility-row {
        grid-template-columns: 1fr;
      }

      .title-block h1 {
        text-shadow:
          0 0 16px rgba(143, 92, 255, 0.72),
          3px 3px 0 #251044,
          5px 5px 0 #000;
      }
    }
  </style>
</head>
<body>
  <main class="page">
    <header>
      <div class="title-block">
        <h1>Comic Quest</h1>
        <p>A single-file RPG prototype for brave experiments, bad decisions, and future portals.</p>
      </div>
    </header>

    <section class="game-grid" aria-label="Comic Quest game">
      <div class="comic-panel">
        <div id="scene-tag" class="scene-tag">Issue #0</div>
        <div id="choice-frames" class="choice-frames" aria-label="Upcoming comic frames"></div>
        <div id="choices" class="choices"></div>
      </div>

      <aside aria-label="Hero status">
        <section class="stats-panel">
          <h2 class="panel-title">Hero Sheet</h2>
          <div class="stat-row"><span>HP</span><span id="hp-value">100</span></div>
          <div class="meter" aria-hidden="true"><span id="hp-meter"></span></div>
          <div class="stat-row"><span>Level</span><span id="level-value">1</span></div>
          <div class="stat-row"><span>Luck</span><span id="luck-value">3</span></div>
          <div class="stat-row"><span>Grit</span><span id="grit-value">2</span></div>
          <div class="inventory" id="inventory"></div>
          <div class="utility-row">
            <button class="utility-btn" id="save-btn" type="button">Save</button>
            <button class="utility-btn" id="reset-btn" type="button">Reset</button>
          </div>
        </section>

        <section class="log-panel">
          <h2 class="panel-title">Quest Log</h2>
          <ul id="quest-log" class="log-list"></ul>
        </section>
      </aside>
    </section>
  </main>

  <script>
    const initialState = {
      hp: 100,
      level: 1,
      luck: 3,
      grit: 2,
      inventory: ["Panel Key"],
      log: ["The first page turns."],
      scene: "intro"
    };

    let state = loadGame() || structuredClone(initialState);

    const scenes = {
      intro: {
        tag: "Issue #0",
        text: "Littlewing waits in front of Lab Zero like he has been hired by the door and paid in crumbs. The city is half ink, half thunder, and every floating page overhead is trying very hard not to spoil the ending.",
        frame: { note: "Panel note: Littlewing has already decided you are late." },
        choices: [
          { label: "Approach Littlewing", next: "littlewing", className: "primary", effect: { log: "Littlewing taps the panel border with one tiny foot." } },
          { label: "Pretend This Is Normal", next: "alley", className: "secondary", effect: { luck: 1, log: "You commit to the ancient strategy of walking away from plot." } }
        ]
      },
      littlewing: {
        tag: "Littlewing",
        text: "Littlewing looks you up and down, then chirps once. Somehow the chirp contains a waiver, a threat, and a map drawn entirely in attitude. The Lab Zero door unlocks one bolt out of pure embarrassment.",
        frame: { note: "Translation pending. Confidence high. Manners low." },
        choices: [
          { label: "Respect the Bird", next: "threshold", className: "primary", effect: { grit: 1, item: "Littlewing's Approval", log: "You earn Littlewing's suspicious approval." } },
          { label: "Ask for Directions", next: "alley", className: "secondary", effect: { luck: 1, log: "Littlewing points everywhere except where you are standing." } }
        ]
      },
      threshold: {
        tag: "Lab Zero Door",
        text: "The door scans your inventory, your posture, and one regrettable thought from last Thursday. A receipt prints from the keypad: ADVENTURER ACCEPTED. WARRANTY VOID IF HERO BECOMES TOO INTERESTING.",
        frame: { note: "The keypad absolutely judges you." },
        choices: [
          { label: "Enter Lab Zero", next: "lab", className: "primary", effect: { log: "The door opens into impossible fluorescent weather." } },
          { label: "Kick the Door Gently", next: "button", className: "secondary", effect: { hp: -4, grit: 1, log: "The door kicks back, politely but firmly." } }
        ]
      },
      lab: {
        tag: "Lab Zero",
        text: "Inside the lab, machines argue about genre. One vat is labeled HERO SAUCE. Another is labeled DO NOT PUT HERO IN SAUCE. A console blinks: PLEASE CHOOSE A TERRIBLE IDEA.",
        frame: { note: "Lab Zero is union-built from bad omens and extension cords." },
        choices: [
          { label: "Press the Shiny Button", next: "button", className: "primary", effect: { hp: -12, level: 1, item: "Sparking Cape", log: "The button explodes into a useful cape." } },
          { label: "Read the Console", next: "console", effect: { grit: 1, log: "You learn the lab was built to test realities, snacks, and alibis." } }
        ]
      },
      alley: {
        tag: "Nope Alley",
        text: "You leave through an alley that was definitely not there a second ago. The walls are covered in speech bubbles with no speakers. One bubble whispers your name. Another asks if you validate parking.",
        frame: { note: "This alley is legally a maze and emotionally a prank." },
        choices: [
          { label: "Take the Side Quest Coupon", next: "coupon", className: "primary", effect: { item: "Side Quest Coupon", log: "You pocket a coupon for future trouble." } },
          { label: "Go Back Before It Gets Weirder", next: "threshold", effect: { log: "The alley folds back toward Lab Zero." } }
        ]
      },
      button: {
        tag: "KRAK-BOOM",
        text: "Smoke clears. Your cape is slightly on fire, your eyebrows have filed a complaint, and Littlewing is standing exactly where he was before, somehow wearing safety goggles.",
        frame: { note: "Littlewing has OSHA energy now." },
        choices: [
          { label: "Strike a Hero Pose", next: "pose", className: "primary", effect: { luck: 1, log: "The pose works better than expected." } },
          { label: "Blame the Console", next: "console", effect: { log: "You point at the console. The console points back." } }
        ]
      },
      console: {
        tag: "The Console",
        text: "The console displays your stats, your likely mistakes, and a menu option called BEAT GAME NOW? It is grayed out, then notices Littlewing staring at it and becomes clickable out of fear.",
        frame: { note: "Current build status: haunted but cooperative." },
        choices: [
          { label: "Run the Win Protocol", next: "winProtocol", className: "primary", effect: { level: 1, log: "You run the win protocol. The lab begins applauding in binary." } },
          { label: "Follow the Sparks", next: "alley", className: "secondary", effect: { log: "The sparks lead you back toward the alley panels." } }
        ]
      },
      coupon: {
        tag: "Coupon Trouble",
        text: "Fine print appears: VALID FOR ONE HEROIC COMPLICATION. Littlewing pecks the coupon, and the coupon pecks back. That means it is legally active.",
        frame: { note: "Never accept paperwork that has reflexes." },
        choices: [
          { label: "Cash It In", next: "couponCash", className: "primary", effect: { hp: -8, level: 1, item: "Mystery IOU", log: "The coupon becomes a promise from the plot." } },
          { label: "Return to the Lab", next: "lab", effect: { log: "You carry the coupon back to Lab Zero." } }
        ]
      },
      couponCash: {
        tag: "Complication Paid",
        text: "The coupon tears itself in half and opens a tiny legal portal. A voice says, 'Congratulations, you have purchased consequences.' Littlewing nods like this is excellent finance.",
        frame: { note: "The plot now owes you exactly one dramatic entrance." },
        choices: [
          { label: "Enter the Legal Portal", next: "winProtocol", className: "primary", effect: { grit: 1, log: "You step through the smallest possible loophole." } },
          { label: "Retreat with Dignity", next: "threshold", className: "secondary", effect: { log: "You retreat with most of your dignity." } }
        ]
      },
      pose: {
        tag: "Splash Pose",
        text: "You hit the pose. The panel widens. The soundtrack arrives six seconds late but with confidence. Littlewing raises one wing, and every broken machine in Lab Zero mistakes it for leadership.",
        frame: { note: "Achievement unlocked: improbable composition." },
        choices: [
          { label: "Accept Leadership", next: "winProtocol", className: "primary", effect: { level: 1, item: "Unlicensed Leadership", log: "Lab Zero accepts your extremely temporary command." } },
          { label: "Ask Littlewing First", next: "littlewing", className: "secondary", effect: { log: "Littlewing pretends this was his plan." } }
        ]
      },
      winProtocol: {
        tag: "You Beat It?",
        text: "Against every reasonable forecast, you beat the prototype. The game pauses, checks its notes, then quietly removes your name from the list of disposable test subjects. Something in Lab Zero opens that was not on the page before.",
        frame: { note: "This is where the next game starts smiling." },
        choices: [
          { label: "Open Lab Zero Menu", href: "lab-zero.html", className: "primary", effect: { log: "A new Lab Zero link appears in the smoke." } },
          { label: "Stay in Comic Quest", next: "finale", className: "secondary", effect: { log: "You decide not to trust a door that celebrates." } }
        ]
      },
      finale: {
        tag: "End of Issue #0",
        text: "The page ends on Littlewing, the lab, and a city full of unfinished adventures. The next issue waits behind the door, tapping its foot, pretending it has not already written three jokes about you.",
        frame: { note: "End card: suspiciously temporary." },
        choices: [
          { label: "Restart Demo", next: "intro", className: "primary", effect: { reset: true } },
          { label: "Pocket Check", href: "one-cig.html" }
        ]
      }
    };

    const sceneTag = document.getElementById("scene-tag");
    const choiceFramesEl = document.getElementById("choice-frames");
    const choicesEl = document.getElementById("choices");
    const hpValue = document.getElementById("hp-value");
    const hpMeter = document.getElementById("hp-meter");
    const levelValue = document.getElementById("level-value");
    const luckValue = document.getElementById("luck-value");
    const gritValue = document.getElementById("grit-value");
    const inventoryEl = document.getElementById("inventory");
    const questLogEl = document.getElementById("quest-log");

    document.getElementById("save-btn").addEventListener("click", () => {
      saveGame();
      addLog("Game saved in this browser.");
      render();
    });

    document.getElementById("reset-btn").addEventListener("click", () => {
      state = structuredClone(initialState);
      localStorage.removeItem("comicQuestSave");
      render();
    });

    function render() {
      const scene = scenes[state.scene] || scenes.intro;
      sceneTag.textContent = scene.tag;
      choiceFramesEl.innerHTML = "";
      choicesEl.innerHTML = "";

      const panel = document.createElement("article");
      panel.className = "choice-frame";

      const artFrame = document.createElement("div");
      artFrame.className = "art-frame";

      const artImage = document.createElement("img");
      artImage.className = "art-image";
      artImage.src = "assets/littlewing-lab.png";
      artImage.alt = "Littlewing stands before the glowing Lab Zero door beneath floating comic pages.";

      const placeholder = document.createElement("span");
      placeholder.className = "art-placeholder";
      placeholder.textContent = "Littlewing at Lab Zero";

      artFrame.append(artImage, placeholder);

      const storyFrame = document.createElement("div");
      storyFrame.className = "story-frame";

      const caption = document.createElement("p");
      caption.className = "frame-caption";
      caption.textContent = scene.text;

      const note = document.createElement("span");
      note.className = "frame-note";
      note.textContent = scene.frame?.note || "";

      storyFrame.append(caption, note);
      panel.append(artFrame, storyFrame);
      choiceFramesEl.appendChild(panel);

      scene.choices.forEach((choice) => {
        const button = document.createElement("button");
        button.type = "button";
        button.className = `choice-btn ${choice.className || ""}`.trim();
        button.textContent = choice.label;
        button.addEventListener("click", () => choose(choice));
        choicesEl.appendChild(button);
      });

      hpValue.textContent = state.hp;
      hpMeter.style.width = `${Math.max(0, Math.min(100, state.hp))}%`;
      levelValue.textContent = state.level;
      luckValue.textContent = state.luck;
      gritValue.textContent = state.grit;

      inventoryEl.innerHTML = "";
      state.inventory.forEach((item) => {
        const chip = document.createElement("span");
        chip.className = "item-chip";
        chip.textContent = item;
        inventoryEl.appendChild(chip);
      });

      questLogEl.innerHTML = "";
      state.log.slice(-4).forEach((entry) => {
        const li = document.createElement("li");
        li.textContent = entry;
        questLogEl.appendChild(li);
      });
    }

    function choose(choice) {
      if (choice.href) {
        window.location.href = choice.href;
        return;
      }

      if (choice.effect?.reset) {
        state = structuredClone(initialState);
      } else {
        applyEffect(choice.effect || {});
        state.scene = choice.next || state.scene;
      }

      saveGame();
      render();
    }

    function applyEffect(effect) {
      state.hp = clamp(state.hp + (effect.hp || 0), 0, 100);
      state.level = Math.max(1, state.level + (effect.level || 0));
      state.luck = Math.max(0, state.luck + (effect.luck || 0));
      state.grit = Math.max(0, state.grit + (effect.grit || 0));

      if (effect.item && !state.inventory.includes(effect.item)) {
        state.inventory.push(effect.item);
      }

      if (effect.log) {
        addLog(effect.log);
      }
    }

    function addLog(entry) {
      state.log.push(entry);
      state.log = state.log.slice(-8);
    }

    function clamp(value, min, max) {
      return Math.max(min, Math.min(max, value));
    }

    function saveGame() {
      localStorage.setItem("comicQuestSave", JSON.stringify(state));
    }

    function loadGame() {
      try {
        const saved = localStorage.getItem("comicQuestSave");
        return saved ? JSON.parse(saved) : null;
      } catch {
        return null;
      }
    }

    render();
  </script>
</body>
</html>
