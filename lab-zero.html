<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Lab Zero Menu</title>
  <style>
    :root {
      --text: #f7f4ff;
      --muted: #c9c3dd;
      --line: #f2edff;
      --purple: #4b1d86;
      --blue: #1b6fd6;
      --green: #5ee08a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 24px;
      font-family: "Trebuchet MS", Arial, sans-serif;
      background: radial-gradient(circle at 20% 16%, rgba(94,224,138,0.2), transparent 24%), radial-gradient(circle at 78% 22%, rgba(143,92,255,0.34), transparent 30%), linear-gradient(135deg, #020204 0%, #0b0714 46%, #08101e 78%, #000 100%);
      color: var(--text);
    }
    main {
      width: min(820px, 100%);
      border: 5px solid var(--line);
      border-radius: 8px;
      padding: clamp(24px, 6vw, 48px);
      background: linear-gradient(145deg, rgba(255,255,255,0.08), transparent 42%), #12121c;
      box-shadow: 10px 10px 0 rgba(0,0,0,0.72), 0 0 38px rgba(94,224,138,0.2);
    }
    .tag {
      display: inline-block;
      margin-bottom: 18px;
      padding: 8px 12px;
      border: 3px solid var(--line);
      border-radius: 6px;
      background: linear-gradient(135deg, var(--purple), #181832);
      box-shadow: 4px 4px 0 #000;
      font-weight: 900;
      text-transform: uppercase;
    }
    h1 {
      margin: 0;
      font-size: clamp(2.4rem, 9vw, 5rem);
      line-height: 0.95;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(143,92,255,0.72), 4px 4px 0 #251044, 7px 7px 0 #000;
    }
    p {
      max-width: 640px;
      color: var(--muted);
      font-size: clamp(1.05rem, 2.5vw, 1.35rem);
      font-weight: 900;
      line-height: 1.4;
    }
    .menu {
      display: grid;
      gap: 12px;
      margin-top: 28px;
    }
    a {
      display: block;
      border: 3px solid var(--line);
      border-radius: 6px;
      padding: 14px 16px;
      background: linear-gradient(135deg, var(--purple), var(--blue));
      box-shadow: 4px 4px 0 #000, 0 0 18px rgba(143,92,255,0.22);
      color: var(--text);
      font-weight: 900;
      text-decoration: none;
      text-transform: uppercase;
      transition: transform 120ms ease, box-shadow 120ms ease;
    }
    a.secondary { background: linear-gradient(135deg, #101625, #30305b); }
    a:hover,
    a:focus-visible {
      transform: translate(2px, 2px);
      box-shadow: 2px 2px 0 #000, 0 0 24px rgba(94,224,138,0.26);
      outline: none;
    }
  </style>
</head>
<body>
  <main>
    <div class="tag">Unlocked From Comic Quest</div>
    <h1>Lab Zero</h1>
    <p>You beat the prototype, so the lab did what any responsible haunted research facility would do: it made you a menu. This is the future doorway for the Lab Zero game.</p>
    <div class="menu" aria-label="Lab Zero menu">
      <a href="index.html">Return to Comic Quest</a>
      <a class="secondary" href="one-cig.html">Pocket Check</a>
      <a class="secondary" href="index.html">New Experiment Pending</a>
    </div>
  </main>
</body>
</html>
